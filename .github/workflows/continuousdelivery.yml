name: Continuous Delivery
on:
  push:
    branches:
      - main #ou qualquer outra branch

jobs:
  deliver:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v5

      - name: Simulando continuous delivery
        uses: actions/upload-artifact@v7
        with:
          name: projeto.zip
          path: |
            main.py
            README.md
